version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: appstore
      POSTGRES_USER: appstore
      POSTGRES_PASSWORD: appstore_secret
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appstore"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://appstore:appstore_secret@db:5432/appstore
      PORT: 3001
      UPLOADS_PATH: /app/uploads
      NODE_ENV: production
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - uploads:/app/uploads
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
  uploads:
