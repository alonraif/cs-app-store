version: '3.9'

# Development override: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Or use the alias: docker compose -f docker-compose.dev.yml up (standalone dev compose)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: appstore
      POSTGRES_USER: appstore
      POSTGRES_PASSWORD: appstore_secret
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appstore"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://appstore:appstore_secret@db:5432/appstore
      PORT: 3001
      UPLOADS_PATH: /app/uploads
      NODE_ENV: development
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - uploads_dev:/app/uploads
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_BACKEND_PROXY: http://backend:3001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    ports:
      - "5173:5173"

volumes:
  db_data_dev:
  uploads_dev:
